name: Update submodules

on:
  workflow_dispatch:
    inputs:
      path:
        description: Exact submodule path from .gitmodules. Leave empty to update all.
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: manual-submodule-update-${{ github.repository }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Update selected submodules
        env:
          REQUESTED_PATH: ${{ inputs.path }}
          SUBMODULE_TOKEN: ${{ secrets.SUBMODULE_TOKEN }}
          SUBMODULE_TOKEN_USERNAME: ${{ secrets.SUBMODULE_TOKEN_USERNAME }}
        run: |
          node scripts/submodule-manager.mjs update \
            --path "$REQUESTED_PATH" \
            --output "$RUNNER_TEMP/submodule-update.json" \
            --markdown "$RUNNER_TEMP/submodule-update.md"

          cat "$RUNNER_TEMP/submodule-update.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Read update result
        id: result
        run: |
          node scripts/submodule-manager.mjs update-output \
            --result "$RUNNER_TEMP/submodule-update.json" >> "$GITHUB_OUTPUT"

      - name: Stop when everything is current
        if: steps.result.outputs.changed == 'false'
        run: echo "No submodule updates were found."

      - name: Create update branch
        if: steps.result.outputs.changed == 'true'
        id: branch
        run: |
          BRANCH="submodule/update-${GITHUB_RUN_ID}"
          git switch -c "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Stage updated gitlinks
        if: steps.result.outputs.changed == 'true'
        run: |
          node scripts/submodule-manager.mjs stage-update \
            --result "$RUNNER_TEMP/submodule-update.json"

      - name: Commit and push
        if: steps.result.outputs.changed == 'true'
        env:
          UPDATE_BRANCH: ${{ steps.branch.outputs.name }}
          CHANGED_COUNT: ${{ steps.result.outputs.changed_count }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git diff --cached --check
          git commit -m "chore: update ${CHANGED_COUNT} submodule(s)"
          git push origin "$UPDATE_BRANCH"

      - name: Create pull request
        if: steps.result.outputs.changed == 'true'
        id: pull-request
        env:
          GH_TOKEN: ${{ github.token }}
          UPDATE_BRANCH: ${{ steps.branch.outputs.name }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          CHANGED_COUNT: ${{ steps.result.outputs.changed_count }}
        run: |
          PR_URL="$(
            gh pr create \
              --head "$UPDATE_BRANCH" \
              --base "$BASE_BRANCH" \
              --title "chore: update ${CHANGED_COUNT} submodule(s)" \
              --body-file "$RUNNER_TEMP/submodule-update.md"
          )"
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Report pull request
        if: steps.result.outputs.changed == 'true'
        env:
          PR_URL: ${{ steps.pull-request.outputs.url }}
        run: |
          echo "Pull request created: ${PR_URL}" >> "$GITHUB_STEP_SUMMARY"
