name: Preview submodule request

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: write

concurrency:
  group: submodule-preview-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: >-
      github.event.issue.pull_request == null &&
      startsWith(github.event.issue.title, '[Submodule]') &&
      contains(github.event.issue.body, '### Repository') &&
      contains(github.event.issue.body, '### Parent path')
    runs-on: ubuntu-latest

    steps:
      - name: Check out the default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Validate request
        run: |
          node scripts/submodule-manager.mjs inspect \
            --event "$GITHUB_EVENT_PATH" \
            --output "$RUNNER_TEMP/submodule-request.json" \
            --markdown "$RUNNER_TEMP/submodule-preview.md"

      - name: Create or update preview comment
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          COMMENT_ID="$(
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- submodule-manager-preview -->"))) | .id' \
              | head -n 1
          )"

          if [ -n "$COMMENT_ID" ]; then
            gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" \
              -f body="$(cat "$RUNNER_TEMP/submodule-preview.md")" >/dev/null
          else
            gh issue comment "$ISSUE_NUMBER" \
              --body-file "$RUNNER_TEMP/submodule-preview.md" >/dev/null
          fi
